name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate-0-security:
    name: Gate 0 — Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci --ignore-scripts
      - name: Run Gate 0 security tests
        run: npm run test:gates -- --reporter=verbose tests/gates/gate_0_security.test.js

  gate-1-foundation:
    name: Gate 1 — Foundation
    needs: gate-0-security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci --ignore-scripts
      - name: Run Gate 1 foundation tests
        run: npm run test:gates -- --reporter=verbose tests/gates/gate_1_foundation.test.js

  unit-tests:
    name: Unit Tests — BotCast Engine
    needs: gate-1-foundation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci --ignore-scripts
      - name: Run debate graph tests
        run: npm run test:botcast -- --reporter=verbose
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-botcast
          path: coverage/

  redundancy-loops:
    name: Redundancy & Failure Loops
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci --ignore-scripts
      - name: Run redundancy failure tests (LOOPS 1-7)
        run: npm run test -- --reporter=verbose tests/botcast/redundancy_failure.test.js
        env:
          NODE_ENV: test

  api-tests:
    name: API Tests
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci --ignore-scripts
      - name: Run API tests
        run: npm run test:api -- --reporter=verbose
        env:
          NODE_ENV: test

  build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci --ignore-scripts
      - run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  docker-build:
    name: Docker Build Check
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build --target runtime -t platformula-api:ci .
