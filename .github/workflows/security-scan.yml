name: Security Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run full history scan every Sunday at 02:00 UTC
    - cron: "0 2 * * 0"

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for scheduled runs

      - name: Run gitleaks (staged / push diff)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_COMMENTS: true

  dependency-audit:
    name: npm Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --ignore-scripts
      - name: Audit dependencies (high + critical)
        run: npm audit --audit-level=high

  env-guard:
    name: Env File Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure .env files are not committed
        run: |
          if git ls-files | grep -E '^\.env(\.[^e][^x]|$)'; then
            echo "ERROR: committed .env file detected"
            exit 1
          fi
          echo "OK: no committed .env files"

  license-check:
    name: License Compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --ignore-scripts
      - name: Check licenses
        run: npx license-checker --onlyAllow "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;CC0-1.0" --excludePrivatePackages
