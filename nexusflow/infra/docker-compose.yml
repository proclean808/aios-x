version: "3.9"

# NexusFlow local development stack.
# Start with: make dev-up
# Stop with:  make dev-down

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexusflow
      POSTGRES_USER: nexusflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexusflow_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexusflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["-js", "-m", "8222", "--name", "nexusflow-nats"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-nexusflow}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-nexusflow_dev_secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: ../services/gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NATS_URL: nats://nats:4222
      DATABASE_URL: postgresql://nexusflow:${POSTGRES_PASSWORD:-nexusflow_dev}@postgres:5432/nexusflow
      CORS_ORIGINS: "http://localhost:3000"
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  nats_data:
  minio_data:
  qdrant_data:
